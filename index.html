<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apna Shikohabad - Premium PWA Local Directory</title>
    
    <!-- PWA Primary Config & Meta Tags -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <meta name="description" content="Apna Shikohabad - Premium PWA local directory. Find verified services, view train schedules, active announcements, and chat with native local AI advisor." />
    <meta name="theme-color" content="#ff6b00" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Apna Shikohabad" />

    <link rel="apple-touch-icon" href="/icon-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        const registerSW = () => {
          navigator.serviceWorker.register('/sw.js').then((reg) => {
            console.log('[PWA] Service Worker registered:', reg.scope);
            reg.update();
          }).catch((err) => {
            console.error('[PWA] Service Worker registration failed:', err);
          });
        };

        if (document.readyState === 'complete' || document.readyState === 'interactive') {
          registerSW();
        } else {
          window.addEventListener('load', registerSW);
        }
      }
    </script>
  </body>
</html>
